name: Generate feature dependency lock

on:
  push:
    branches:
      - feat/family-onboarding-foundation

permissions:
  contents: write

jobs:
  generate-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/family-onboarding-foundation
      - name: Check whether the lock already exists
        id: lock
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
          else
            echo "missing=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.lock.outputs.missing == 'true'
        with:
          node-version: 22.16.0
      - name: Generate lock with repository npm version
        if: steps.lock.outputs.missing == 'true'
        run: |
          corepack enable
          npm install --package-lock-only --ignore-scripts
      - name: Commit generated lock
        if: steps.lock.outputs.missing == 'true'
        run: |
          test -f package-lock.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "build: commit repository dependency lock"
          git push origin HEAD:feat/family-onboarding-foundation
