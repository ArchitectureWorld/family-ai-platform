name: iOS CI

on:
  pull_request:
    paths:
      - "clients/ios/**"
      - "packages/contracts/**"
      - ".github/workflows/ios-ci.yml"
  push:
    branches:
      - main
    paths:
      - "clients/ios/**"
      - "packages/contracts/**"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          show-progress: false

      - name: Show toolchain
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version

      - name: Validate project and build app
        run: |
          set -euo pipefail
          xcodebuild \
            -project clients/ios/FamilyAI.xcodeproj \
            -scheme FamilyAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Select and boot available iPhone simulator
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_UDID="$(python3 - <<'PY'
          import json
          import subprocess

          payload = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )
          for runtime in sorted(payload["devices"], reverse=True):
              for device in payload["devices"][runtime]:
                  if device["name"].startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit("No available iPhone simulator")
          PY
          )"
          test -n "$SIMULATOR_UDID"
          echo "udid=$SIMULATOR_UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b

      - name: Build test bundles
        run: |
          set -euo pipefail
          xcodebuild -quiet \
            -project clients/ios/FamilyAI.xcodeproj \
            -scheme FamilyAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -parallel-testing-enabled NO \
            build-for-testing

      - name: Run CredentialStoreTests
        id: credential_store_tests
        run: |
          set -euo pipefail
          rm -rf /tmp/FamilyAI-credential-store-tests.xcresult
          xcodebuild -quiet \
            -project clients/ios/FamilyAI.xcodeproj \
            -scheme FamilyAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -only-testing:FamilyAITests/CredentialStoreTests \
            -parallel-testing-enabled NO \
            -resultBundlePath /tmp/FamilyAI-credential-store-tests.xcresult \
            test-without-building

      - name: Run GatewayClientTests
        id: gateway_client_tests
        if: always() && steps.simulator.outcome == 'success'
        run: |
          set -euo pipefail
          rm -rf /tmp/FamilyAI-gateway-client-tests.xcresult
          xcodebuild -quiet \
            -project clients/ios/FamilyAI.xcodeproj \
            -scheme FamilyAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -only-testing:FamilyAITests/GatewayClientTests \
            -parallel-testing-enabled NO \
            -resultBundlePath /tmp/FamilyAI-gateway-client-tests.xcresult \
            test-without-building

      - name: Summarize test results
        if: always()
        run: |
          set -uo pipefail
          for RESULT in \
            /tmp/FamilyAI-credential-store-tests.xcresult \
            /tmp/FamilyAI-gateway-client-tests.xcresult
          do
            if [[ -d "$RESULT" ]]; then
              echo "===== $RESULT ====="
              xcrun xcresulttool get test-results summary --path "$RESULT" || true
            fi
          done
          echo "CredentialStoreTests: ${{ steps.credential_store_tests.outcome }}"
          echo "GatewayClientTests: ${{ steps.gateway_client_tests.outcome }}"
