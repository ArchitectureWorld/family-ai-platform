name: iOS CI

on:
  pull_request:
    paths:
      - "clients/ios/**"
      - "packages/contracts/**"
      - ".github/workflows/ios-ci.yml"
  push:
    branches:
      - main
    paths:
      - "clients/ios/**"
      - "packages/contracts/**"
      - ".github/workflows/ios-ci.yml"

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          show-progress: false

      - name: Show toolchain
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version

      - name: Validate project and build app
        run: |
          set -euo pipefail
          xcodebuild \
            -project clients/ios/FamilyAI.xcodeproj \
            -scheme FamilyAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Select and boot available iPhone simulator
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_UDID="$(python3 - <<'PY'
          import json
          import subprocess

          payload = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "devices", "available", "-j"],
                  text=True,
              )
          )
          for runtime in sorted(payload["devices"], reverse=True):
              for device in payload["devices"][runtime]:
                  if device["name"].startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit("No available iPhone simulator")
          PY
          )"
          test -n "$SIMULATOR_UDID"
          echo "udid=$SIMULATOR_UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$SIMULATOR_UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          xcrun simctl list devices | grep "$SIMULATOR_UDID"

      - name: Build test bundles
        run: |
          set -euo pipefail
          xcodebuild -quiet \
            -project clients/ios/FamilyAI.xcodeproj \
            -scheme FamilyAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -destination-timeout 60 \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            build-for-testing

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -rf /tmp/FamilyAI-unit-tests.xcresult
          xcodebuild -quiet \
            -project clients/ios/FamilyAI.xcodeproj \
            -scheme FamilyAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -destination-timeout 60 \
            -only-testing:FamilyAITests \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 60 \
            -maximum-test-execution-time-allowance 120 \
            -resultBundlePath /tmp/FamilyAI-unit-tests.xcresult \
            test-without-building

      - name: Run UI tests
        id: ui_tests
        continue-on-error: true
        run: |
          set -euo pipefail
          rm -rf /tmp/FamilyAI-ui-tests.xcresult
          xcodebuild -quiet \
            -project clients/ios/FamilyAI.xcodeproj \
            -scheme FamilyAI \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -destination-timeout 60 \
            -only-testing:FamilyAIUITests \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 120 \
            -maximum-test-execution-time-allowance 180 \
            -resultBundlePath /tmp/FamilyAI-ui-tests.xcresult \
            test-without-building

      - name: Summarize test results
        if: always()
        run: |
          set -uo pipefail
          for RESULT in \
            /tmp/FamilyAI-unit-tests.xcresult \
            /tmp/FamilyAI-ui-tests.xcresult
          do
            if [[ -d "$RESULT" ]]; then
              echo "===== $RESULT ====="
              xcrun xcresulttool get test-results summary --path "$RESULT" || true
            fi
          done

          echo "Unit tests: ${{ steps.unit_tests.outcome }}"
          echo "UI tests: ${{ steps.ui_tests.outcome }}"

          if [[ "${{ steps.unit_tests.outcome }}" != "success" ]] || \
             [[ "${{ steps.ui_tests.outcome }}" != "success" ]]; then
            exit 1
          fi
