name: Temporary Family feature lock generator

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

# One-time workflow. Delete immediately after package-lock.json reaches PR #4.
jobs:
  generate-lock:
    if: >-
      github.event.pull_request.number == 4 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/family-onboarding-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Generate and commit the feature lock once
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            echo "package-lock.json already exists on the feature branch."
            exit 0
          fi
          corepack enable
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          test -f package-lock.json
          node -e 'const lock=require("./package-lock.json"); if(lock.lockfileVersion!==3) process.exit(1)'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "build: commit repository dependency lock"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
