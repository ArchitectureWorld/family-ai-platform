name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and run quality gate
        id: quality
        shell: bash
        run: |
          set -o pipefail
          {
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run check
          } 2>&1 | tee ci-output.txt
      - name: Upload CI output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-output
          path: ci-output.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Publish PR diagnostics
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- family-ai-ci-diagnostics -->';
            const raw = fs.existsSync('ci-output.txt')
              ? fs.readFileSync('ci-output.txt', 'utf8')
              : 'CI did not produce an output file.';
            const output = raw.slice(-50000).replace(/```/g, '~~~');
            const conclusion = '${{ steps.quality.outcome }}';
            const body = `${marker}\n## CI diagnostics\n\nOutcome: **${conclusion}**\n\n<details><summary>Latest output</summary>\n\n\`\`\`text\n${output}\n\`\`\`\n</details>`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const previous = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
