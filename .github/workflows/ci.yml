name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Generate the Family feature lock once
        id: lock
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.head.ref == 'feat/family-onboarding-foundation'
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          corepack enable
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund --omit-lockfile-registry-resolved=true
          test -f package-lock.json
          node -e 'const lock=require("./package-lock.json"); if(lock.lockfileVersion!==3) process.exit(1)'
          echo "generated=true" >> "$GITHUB_OUTPUT"
      - name: Upload generated lock for audit
        if: steps.lock.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-package-lock
          path: package-lock.json
          if-no-files-found: error
          retention-days: 7
      - name: Commit generated lock to feature branch
        if: steps.lock.outputs.generated == 'true'
        continue-on-error: true
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "build: commit repository dependency lock"
          git push origin HEAD:${{ github.head_ref }}
      - name: Install and run quality gate
        id: quality
        shell: bash
        run: |
          set -o pipefail
          {
            test -f package-lock.json
            npm ci
            npm run check
          } 2>&1 | tee ci-output.txt
      - name: Upload CI output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-output
          path: ci-output.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Publish PR diagnostics
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- family-ai-ci-diagnostics -->';
            const raw = fs.existsSync('ci-output.txt')
              ? fs.readFileSync('ci-output.txt', 'utf8')
              : 'CI did not produce an output file.';
            const output = raw.slice(-50000).replace(/```/g, '~~~');
            const lockGenerated = '${{ steps.lock.outputs.generated }}';
            const conclusion = '${{ steps.quality.outcome }}';
            const body = `${marker}\n## CI diagnostics\n\nLock generated: **${lockGenerated || 'false'}**\n\nOutcome: **${conclusion}**\n\n<details><summary>Latest output</summary>\n\n\`\`\`text\n${output}\n\`\`\`\n</details>`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const previous = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
