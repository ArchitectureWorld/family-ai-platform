name: family-ai-platform-foundation

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: family-ai-platform-foundation/gateway:foundation
    init: true
    restart: unless-stopped
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    env_file:
      - ./.runtime/config/gateway.env
    environment:
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_CONTAINERIZED: "true"
      GATEWAY_DATABASE_PATH: /app/.runtime/data/gateway.sqlite
    ports:
      - "127.0.0.1:8790:8790"
    volumes:
      - ./.runtime/data:/app/.runtime/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8790/health').then(async r=>{const b=await r.json();if(!r.ok||b.service!=='family-ai-gateway-foundation')process.exit(1)}).catch(()=>process.exit(1))
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s
